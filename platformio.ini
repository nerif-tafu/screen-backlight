; ESP32-C3 Ambient Monitor Backlight Controller
; Board: Seeed Studio XIAO ESP32-C3

[env:seeed_xiao_esp32c3]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
board_build.partitions = partitions.csv
extra_scripts = pre:scripts/load_wifi_secrets.py

lib_deps =
    fastled/FastLED@^3.7.0
    bblanchon/ArduinoJson@^7.2.0
    mathieucarbou/ESPAsyncWebServer@^3.3.23
    mathieucarbou/AsyncTCP@^3.2.5

build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DFIRMWARE_VERSION=\"1.1.0\"
    -DLED_DATA_PIN=4
    -DAP_SSID=\"Backlight-Setup\"
    -DAP_PASSWORD=\"\"
    -DHOSTNAME=\"backlight\"

upload_speed = 921600

; Wireless upload after initial USB flash (device must be on Wi-Fi)
[env:seeed_xiao_esp32c3_ota]
extends = env:seeed_xiao_esp32c3
upload_protocol = espota
upload_port = backlight.local
