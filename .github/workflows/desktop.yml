name: Build Desktop App

on:
  push:
    branches: [main]
    paths:
      - 'desktop/**'
      - '.github/workflows/desktop.yml'
  pull_request:
    paths:
      - 'desktop/**'
      - '.github/workflows/desktop.yml'

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop/BacklightStreamer

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore BacklightStreamer.csproj

      - name: Publish
        run: >
          dotnet publish BacklightStreamer.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o ../../publish/desktop

      - uses: actions/upload-artifact@v4
        with:
          name: BacklightStreamer-win-x64
          path: publish/desktop/BacklightStreamer.exe
